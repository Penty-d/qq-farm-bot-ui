name: Docker-Build-Push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 必须保留 QEMU 才能在 GitHub 的电脑上模拟出 arm/v7 环境
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 只保留这一个，针对你的设备进行精准构建
          platforms: linux/arm/v7
          tags: ghcr.io/${{ github.repository_owner }}/qq-farm-bot-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
