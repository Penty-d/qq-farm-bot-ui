name: Docker-Build-Push

on:
  push:
    branches: [ "main" ]  # 只有 main 分支变动时才触发
  workflow_dispatch:      # 允许你手动点击按钮触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 设置 Docker Buildx (支持多平台构建的插件)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub 镜像仓库
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送到镜像库
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像名称会变成：ghcr.io/你的用户名/qq-farm-bot-ui:latest
          tags: ghcr.io/${{ github.repository_owner }}/qq-farm-bot-ui:latest
          # 开启缓存，下次构建会快很多
          cache-from: type=gha
          cache-to: type=gha,mode=max
